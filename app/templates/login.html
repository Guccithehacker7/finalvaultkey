{% extends "base.html" %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-icon">🪪</div>
      <h1>Welcome back</h1>
      <p>Sign in to your VaultKey account</p>
    </div>

    <!-- Tab switcher -->
    <div class="login-tabs">
      <button class="login-tab active" id="tab-password" type="button">Email &amp; Password</button>
      <button class="login-tab" id="tab-cert" type="button">Certificate PEM</button>
    </div>

    <!-- Email + Password form -->
    <form id="login-form-password">
      <label>Email Address</label>
      <input type="email" id="login-email" required autocomplete="email" placeholder="alice@example.com" />
      <label>Password</label>
      <input type="password" id="login-password" required autocomplete="current-password" placeholder="Your password" />
      <button type="submit" class="btn-full">Login →</button>
    </form>

    <!-- Certificate form (hidden by default) -->
    <form id="login-form-cert" style="display:none">
      <label>Certificate PEM</label>
      <textarea id="certificate-pem" rows="9" required placeholder="-----BEGIN CERTIFICATE-----&#10;...&#10;-----END CERTIFICATE-----"></textarea>
      <button type="submit" class="btn-full">Login with Certificate →</button>
    </form>

    <section class="output" id="login-output"></section>

    <p class="auth-footer">Don't have an account? <a href="/register">Register here</a></p>
  </div>
</div>
{% endblock %}
