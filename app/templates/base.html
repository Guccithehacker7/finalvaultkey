<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VaultKey Enterprise</title>
    <link rel="stylesheet" href="{{ url_for('frontend.static', filename='css/style.css') }}" />
  </head>
  <body>

    <header class="navbar">
      <div class="container">
        <a class="brand" href="/">
          <span class="brand-icon">🔐</span>
          VaultKey
        </a>
        <nav>
          <a href="/register"  id="nav-register">Register</a>
          <a href="/login"     id="nav-login">Login</a>
          <a href="/dashboard" id="nav-dashboard"  style="display:none">Dashboard</a>
          <a href="/vault"     id="nav-vault"      style="display:none">Vault</a>
          <a href="/documents" id="nav-documents"  style="display:none">Documents</a>
          <a href="/admin"     id="nav-admin"       style="display:none">Admin</a>
          <a href="#"          id="nav-logout"      style="display:none">Logout</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer-inner">
          <div class="footer-brand"><span>🔐</span> VaultKey Enterprise</div>
          <span class="footer-copy">© 2025 VaultKey — PKI-secured identity &amp; vault platform</span>
          <div class="footer-links">
            <a href="/">Home</a>
            <a href="/register">Register</a>
            <a href="/login">Login</a>
          </div>
        </div>
      </div>
    </footer>

    <script src="{{ url_for('frontend.static', filename='js/main.js') }}"></script>
  </body>
</html>
